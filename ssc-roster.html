    {
      title: '2 · The Lurker Below',
      fields: ['ssc-lurker-platform-1-assignments', 'ssc-lurker-platform-2-assignments', 'ssc-lurker-platform-3-assignments']
    },
    {
      title: '3 · Leotheras the Blind',
      fields: ['ssc-leotheras-demon-tank', 'ssc-leotheras-demon-tank-healers']
    },
    {
      title: '4 · Fathom-Lord Karathress',
      fields: ['ssc-karathress-karathress-tank', 'ssc-karathress-tidalvess-tank', 'ssc-karathress-sharkkis-tank', 'ssc-karathress-caribdis-tank']
    },
    {
      title: '5 · Morogrim Tidewalker',
      fields: ['ssc-morogrim-north-paladin', 'ssc-morogrim-south-paladin', 'ssc-morogrim-watery-grave-healers']
    },
    {
      title: '6 · Lady Vashj',
      fields: ['ssc-vashj-pylon-1-nw', 'ssc-vashj-pylon-2-ne', 'ssc-vashj-pylon-3-se', 'ssc-vashj-pylon-4-sw', 'ssc-vashj-strider-tank']
    }
  ];

  function titleFromKey(key) {
    return key.replace(/-/g, ' ').replace(/\b\w/g, function(char) { return char.toUpperCase(); });
  }

  function getFieldMeta(key) {
    return FIELD_META[key] || { boss: 'Assignments', label: titleFromKey(key), placeholder: 'Player', defaultLabel: 'Player' };
  }

  function makeRoleIcon(meta) {
    const iconCell = document.createElement('span');
    iconCell.className = 'role-icon';
    const markerSrc = meta.marker ? raidMarkerSource(meta.marker) : '';
    if (markerSrc) {
      iconCell.className += ' raid-position-icon';
      iconCell.innerHTML = '<img src="' + markerSrc + '" alt="' + (meta.markerTitle || meta.label || 'Raid marker') + '" title="' + (meta.markerTitle || meta.label || 'Raid marker') + '">';
    } else if (meta.icon) {
      iconCell.innerHTML = '<img src="' + iconUrl(meta.icon) + '" alt="">';
    }
    return iconCell;
  }

  async function loadRosterSchema() {
    const response = await fetch(ROSTER_SCHEMA_PATH, { cache: 'no-cache' });
    if (!response.ok) throw new Error('Failed to load SSC roster schema');
    const schema = await response.json();
    return schema && schema.fields ? schema.fields : {};
  }

  function ensureRosterStateShape(nextState) {
    const safeState = nextState && typeof nextState === 'object' ? nextState : {};
    const rosterState = {
      groups: safeState.groups && typeof safeState.groups === 'object' && !Array.isArray(safeState.groups) ? safeState.groups : {},
      singles: safeState.singles && typeof safeState.singles === 'object' && !Array.isArray(safeState.singles) ? safeState.singles : {},
      meta: safeState.meta && typeof safeState.meta === 'object' && !Array.isArray(safeState.meta) ? safeState.meta : {}
    };
    if (Object.prototype.hasOwnProperty.call(rosterState.singles, SOFT_RESERVE_KEY)) {
      if (!Object.prototype.hasOwnProperty.call(rosterState.meta, SOFT_RESERVE_KEY)) rosterState.meta[SOFT_RESERVE_KEY] = rosterState.singles[SOFT_RESERVE_KEY];
      delete rosterState.singles[SOFT_RESERVE_KEY];
    }
    return rosterState;
  }

  function currentSession() {
    return sessionClient && sessionClient.getCurrentSession ? sessionClient.getCurrentSession() : { mode: 'local', isSessionBacked: false };
  }

  function loadState() {
    if (sessionClient && sessionClient.loadSessionRoster) return Promise.resolve(sessionClient.loadSessionRoster());
    return Promise.resolve(storage.loadRoster(RAID_ID));
  }

  function saveState() {
    const rosterState = ensureRosterStateShape(state);
    if (sessionClient && sessionClient.saveSessionRoster) return sessionClient.saveSessionRoster(rosterState);
    storage.saveRoster(rosterState, RAID_ID);
    return Promise.resolve(true);
  }

  function clearSavedState() {
    if (sessionClient && sessionClient.clearSessionRoster) return Promise.resolve(sessionClient.clearSessionRoster());
    storage.clearRoster(RAID_ID);
    return Promise.resolve(true);
  }

  function setButtonContent(button, iconSrc, label) {
    if (!button) return;
    button.textContent = '';

    const icon = document.createElement('img');
    icon.className = 'btn-icon-img';
    icon.src = iconSrc;
    icon.alt = '';
    icon.setAttribute('aria-hidden', 'true');
    button.appendChild(icon);

    const text = document.createElement('span');
    text.textContent = label;
    button.appendChild(text);
  }

  function raidsheetUrl() {
    const session = currentSession();
    const url = new URL(GUIDE_PAGE, location.href);
    url.search = '';
    url.hash = '';

    if (session && session.isSessionBacked && session.publicCode) {
      url.search = '?code=' + encodeURIComponent(session.publicCode);
    } else if (session && session.isSessionBacked && session.sessionId) {
      url.search = '?session=' + encodeURIComponent(session.sessionId);
    }

    return url.href;
  }

  function publicGuideUrl() {
    const session = currentSession();

    if (session && session.isSessionBacked && session.publicCode) {
      return new URL('/raid/' + encodeURIComponent(session.publicCode), location.origin).href;
    }

    return raidsheetUrl();
  }

  function publicGuideUrlFromSessionData(data) {
    if (data && data.publicCode) {
      return new URL('/raid/' + encodeURIComponent(String(data.publicCode).toUpperCase()), location.origin).href;
    }

    if (data && data.sessionId) {
      const url = new URL(GUIDE_PAGE, location.href);
      url.search = '?session=' + encodeURIComponent(data.sessionId);
      url.hash = '';
      return url.href;
    }

    return publicGuideUrl();
  }

  function copyPublicGuideLink(button) {
    const session = currentSession();
    if (!session || !session.isSessionBacked) return Promise.resolve(false);
    const copied = copyTextPromiseWithButtonFeedback(Promise.resolve(publicGuideUrl()), button, 'Copy this raider view link:');
    return copied;
  }

  function exportRaidSheetLink(button) {
    const session = currentSession();
    if (session && session.isSessionBacked) {
      return copyPublicGuideLink(button);
    }

    if (!sessionClient || !sessionClient.createSessionFromRoster) {
      const copied = copyTextPromiseWithButtonFeedback(Promise.resolve(publicGuideUrl()), button, 'Online export is unavailable. Copy this local guide link:');
      return copied;
    }

    const sessionPromise = sessionClient.createSessionFromRoster(RAID_ID, ensureRosterStateShape(state))
      .then(function(data) {
        if (!data || !data.editUrl) throw new Error('Missing session edit URL');
        return data;
      });
    const copied = copyTextPromiseWithButtonFeedback(
      sessionPromise.then(publicGuideUrlFromSessionData),
      button,
      'Copy this raider view link:'
    ).catch(function(error) {
      console.warn('[Roster] Unable to copy raider view link.', error && error.message ? error.message : error);
      return false;
    });

    if (button) {
      button.disabled = true;
      button.textContent = 'Creating…';
    }

    return sessionPromise
      .then(function(data) {
        return copied.then(function() {
          window.location.assign(new URL(data.editUrl, window.location.href).toString());
        });
      })
      .catch(function(error) {
        console.error('[Roster] Unable to export current roster.', error && error.message ? error.message : error);
        alert('Could not export the current roster. Please try again.');
      })
      .finally(function() {
        if (button) {
          button.disabled = false;
          setButtonContent(button, 'assets/shared/icons/create-raidsheet.svg', 'Create Raidsheet');
        }
      });
  }

  function updatePublicGuideControls() {
    const session = currentSession();
    const isSessionBacked = !!(session && session.isSessionBacked);
    const publicCode = session && session.publicCode ? String(session.publicCode).toUpperCase() : '';
    const guideLink = document.getElementById('public-guide-link');
    const exportButton = document.getElementById('export-raid-sheet-link');
    if (guideLink) {
      guideLink.href = raidsheetUrl();
      setButtonContent(guideLink, 'assets/shared/icons/raidsheet.svg', 'Raidsheet');
    }
    if (exportButton) {
      exportButton.disabled = false;
      setButtonContent(
        exportButton,
        isSessionBacked ? 'assets/shared/icons/share-link.svg' : 'assets/shared/icons/create-raidsheet.svg',
        isSessionBacked ? (publicCode ? 'raid/' + publicCode : 'Copy Raider View Link') : 'Create Raidsheet'
      );
      exportButton.title = isSessionBacked ? 'Copy the raider view link.' : '';
    }
  }

  function normalizeState() {
    state = ensureRosterStateShape(state);

    Object.keys(rosterSchema.fields).forEach(function(key) {
      const field = rosterSchema.fields[key] || {};
      if (field.type === 'list') {
        if (!Array.isArray(state.groups[key])) {
          state.groups[key] = state.singles[key] ? [state.singles[key]] : [''];
          delete state.singles[key];
        }
        if (!state.groups[key].length) state.groups[key].push('');
      }
    });
  }

  function singleRow(key) {
    const meta = getFieldMeta(key);
    const row = document.createElement('div');
    row.className = 'roster-row';

    const label = document.createElement('span');
    label.className = 'role-text';
    label.textContent = meta.label;

    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = meta.placeholder || 'Player';
    input.dataset.roster = key;
    input.value = state.singles[key] || '';
    input.addEventListener('input', function() {
      const trimmed = input.value.trim();
      if (trimmed) state.singles[key] = trimmed;
      else delete state.singles[key];
      saveState();
    });

    row.appendChild(makeRoleIcon(meta));
    row.appendChild(label);
    row.appendChild(input);
    return row;
  }

  function slotControls(key) {
    const controls = document.createElement('span');
    controls.className = 'slot-controls';
    controls.innerHTML = '<button class="slot-btn" type="button" data-action="add" data-target="' + key + '" title="Add">+</button><button class="slot-btn" type="button" data-action="remove" data-target="' + key + '" title="Remove">−</button>';
    return controls;
  }

  function listRowLabel(meta, key, idx, inlineControls) {
    const baseLabel = meta.defaultLabel || meta.label || 'Player';
    if (meta.suppressNumbering) return baseLabel;
    if (meta.forceNumbering) return baseLabel + ' ' + (idx + 1);
    if (inlineControls && idx === 0) return meta.label;
    return baseLabel + (state.groups[key].length > 1 ? ' ' + (idx + 1) : '');
  }

  function misdirectTargetLabel(meta) {
    const label = document.createElement('span');
    label.className = 'md-target-label';
    label.appendChild(document.createTextNode('→'));

    const marker = document.createElement('span');
    marker.className = 'raid-marker';
    marker.innerHTML = '<img src="' + raidMarkerSource(meta.targetMarker) + '" alt="' + (meta.targetMarkerTitle || '') + '" title="' + (meta.targetMarkerTitle || '') + '">';
    label.appendChild(marker);

    const target = document.createElement('span');
    target.className = 'md-target-text';
    target.textContent = '→ ' + (meta.targetText || 'tank');
    label.appendChild(target);
    return label;
  }


  function normalizedAssignmentName(value) {
    return (value || '').trim().toLowerCase();
  }

  function findDuplicateListAssignment(key, idx, value) {
    const uniqueConfig = UNIQUE_LIST_GROUPS[key];
    const normalizedValue = normalizedAssignmentName(value);
    if (!uniqueConfig || !normalizedValue) return false;
    return uniqueConfig.fields.some(function(fieldKey) {
      return (state.groups[fieldKey] || []).some(function(existingValue, existingIdx) {
        if (fieldKey === key && existingIdx === idx) return false;
        return normalizedAssignmentName(existingValue) === normalizedValue;
      });
    });
  }

  function validateUniqueListAssignment(key, idx, input) {
    const uniqueConfig = UNIQUE_LIST_GROUPS[key];
    if (!uniqueConfig || !findDuplicateListAssignment(key, idx, input.value)) return true;
    input.value = '';
    state.groups[key][idx] = '';
    alert(uniqueConfig.message);
    saveState();
    return false;
  }

  function maxCountForList(key) {
    const meta = getFieldMeta(key);
    return Number.isInteger(meta.maxCount) ? meta.maxCount : null;
  }

  function listHasMaxSlots(key) {
    const maxCount = maxCountForList(key);
    return maxCount !== null && state.groups[key].length >= maxCount;
  }

  function renderList(list, key) {
    const meta = getFieldMeta(key);
    const inlineControls = list.dataset.inlineControls === 'true';
    const isMisdirect = !!(meta.targetMarker && raidMarkerSource(meta.targetMarker));
    list.innerHTML = '';
    if (inlineControls) {
      const controls = slotControls(key);
      if (isMisdirect) controls.classList.add('slot-controls-to-input');
      list.appendChild(controls);
    }

    state.groups[key].forEach(function(value, idx) {
      const row = document.createElement('div');
      row.className = 'roster-row' + (isMisdirect ? ' misdirect-target-row' : '');

      const label = document.createElement('span');
      label.className = 'role-text';
      label.textContent = listRowLabel(meta, key, idx, inlineControls);

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = meta.placeholder || 'Player';
      input.value = value || '';
      input.addEventListener('input', function() {
        if (!validateUniqueListAssignment(key, idx, input)) return;
        state.groups[key][idx] = input.value.trim();
        saveState();
      });

      row.appendChild(makeRoleIcon(meta));
      if (!meta.suppressRowLabel) row.appendChild(label);
      row.appendChild(input);
      if (isMisdirect) row.appendChild(misdirectTargetLabel(meta));
      list.appendChild(row);
    });

    document.querySelectorAll('.slot-btn[data-action="add"][data-target="' + key + '"]').forEach(function(addBtn) {
      addBtn.disabled = listHasMaxSlots(key);
    });
    document.querySelectorAll('.slot-btn[data-action="remove"][data-target="' + key + '"]').forEach(function(removeBtn) {
      removeBtn.disabled = state.groups[key].length <= 1;
    });
  }

  function controlsSpacer() {
    const spacer = document.createElement('div');
    spacer.className = 'roster-controls-spacer';
    spacer.setAttribute('aria-hidden', 'true');
    return spacer;
  }

  function singleFieldBlock(key) {
    const wrapper = document.createElement('div');
    wrapper.className = 'roster-group roster-inline-field roster-group-has-spacer';
    wrapper.appendChild(controlsSpacer());
    wrapper.appendChild(singleRow(key));
    return wrapper;
  }

  function listBlock(key, inlineControls) {
    const meta = getFieldMeta(key);
    const wrapper = document.createElement('div');
    wrapper.className = 'roster-group';

    const list = document.createElement('div');
    list.dataset.slotList = key;

    if (inlineControls) {
      wrapper.className += ' roster-inline-list';
      list.dataset.inlineControls = 'true';
    } else {
      const header = document.createElement('div');
      header.className = 'roster-group-label';
      const title = document.createElement('span');
      title.textContent = meta.label;
      header.appendChild(title);
      header.appendChild(slotControls(key));
      wrapper.appendChild(header);
    }

    wrapper.appendChild(list);
    renderList(list, key);
    return wrapper;
  }

  function appendField(container, key, inlineListControls, alignSingleWithLists) {
    const field = rosterSchema.fields[key];
    if (!field) return;
    if (field.type === 'list') {
      container.appendChild(listBlock(key, inlineListControls));
      return;
    }
    container.appendChild(alignSingleWithLists ? singleFieldBlock(key) : singleRow(key));
  }

  function fieldIsList(key) {
    const field = rosterSchema.fields[key];
    return !!field && field.type === 'list';
  }

  function sectionHeader(config) {
    const header = document.createElement('div');
    header.className = 'roster-section-header';
    header.appendChild(document.createTextNode(config.title));
    if (config.subtitle) {
      const subtitle = document.createElement('small');
      subtitle.textContent = config.subtitle;
      header.appendChild(subtitle);
    }
    return header;
  }

  function blockColumn(block, alignWithListBlocks) {
    const wrapper = document.createElement('div');
    const blockClass = 'core-roster-block-' + block.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const needsSpacer = alignWithListBlocks && !fieldIsList(block.fields[0]);
    wrapper.className = 'roster-group core-roster-block ' + blockClass + (needsSpacer ? ' roster-group-has-spacer' : '');

    const label = document.createElement('div');
    label.className = 'roster-group-label';
    label.textContent = block.title;
    wrapper.appendChild(label);
    if (needsSpacer) wrapper.appendChild(controlsSpacer());

    block.fields.forEach(function(key) { appendField(wrapper, key, true, false); });
    return wrapper;
  }

  function renderRoster() {
    const sections = document.getElementById('roster-sections');
    sections.innerHTML = '';

    ROSTER_LAYOUT.forEach(function(config) {
      const section = document.createElement('section');
      section.className = 'roster-section';
      if (config.blocks) section.className += ' core-roster-section';
      else section.className += ' boss-roster-section';
      const grid = document.createElement('div');
      grid.className = 'roster-grid';

      if (config.blocks) {
        const alignWithListBlocks = config.blocks.some(function(block) { return fieldIsList(block.fields[0]); });
        config.blocks.forEach(function(block) { grid.appendChild(blockColumn(block, alignWithListBlocks)); });
      } else {
        const sectionHasInlineLists = config.fields.some(fieldIsList);
        config.fields.forEach(function(key) { appendField(grid, key, true, sectionHasInlineLists); });
      }

      section.appendChild(sectionHeader(config));
      section.appendChild(grid);
      sections.appendChild(section);
    });
  }


  function initSoftReserveInput() {
    bindSoftReserveInput({ getState: function() { return state; }, key: SOFT_RESERVE_KEY, saveState: saveState });
  }

  function initButtons() {
    document.addEventListener('click', function(event) {
      const btn = event.target && event.target.closest ? event.target.closest('.slot-btn[data-action]') : null;
      if (!btn) return;
      const key = btn.dataset.target;
      if (!rosterSchema.fields[key] || rosterSchema.fields[key].type !== 'list') return;
      if (btn.dataset.action === 'add') {
        if (listHasMaxSlots(key)) return;
        state.groups[key].push('');
      }
      if (btn.dataset.action === 'remove' && state.groups[key].length > 1) state.groups[key].pop();
      saveState();
      const list = document.querySelector('[data-slot-list="' + key + '"]');
      if (list) renderList(list, key);
    });

    const exportBtn = document.getElementById('export-raid-sheet-link');
    if (exportBtn) exportBtn.addEventListener('click', function() {
      exportRaidSheetLink(exportBtn);
    });

    const clearBtn = document.getElementById('clear-roster');
    if (clearBtn) clearBtn.addEventListener('click', function() {
      if (!confirm('Clear all SSC assignments?')) return;
      state = { groups: {}, singles: {}, meta: {} };
      normalizeState();
      clearSavedState().then(function() { return saveState(); }).finally(function() {
        renderRoster();
        const softReserveInput = document.getElementById('soft-reserve-url');
        if (softReserveInput) softReserveInput.value = '';
      });
    });

  }

  async function init() {
    try {
      rosterSchema.fields = await loadRosterSchema();
    } catch (error) {
      document.getElementById('load-notice').textContent = 'Unable to load SSC roster schema.';
      rosterSchema.fields = {};
    }
    try {
      state = await loadState();
    } catch (error) {
      document.getElementById('load-notice').textContent = 'Unable to load the saved SSC roster. Starting from an empty roster.';
      state = { groups: {}, singles: {}, meta: {} };
    }
    normalizeState();
    saveState();
    renderRoster();
    updatePublicGuideControls();
    initSoftReserveInput();
    initButtons();
  }

  init();
})();
</script>
</body>
</html>
