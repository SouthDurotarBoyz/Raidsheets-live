<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gruul's Lair · Roster</title>
<style>
  @page { size: letter landscape; margin: 0.35in; }
  @media print { * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; } body { background: white; padding: 0; } .screen-only { display: none !important; } }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 12.5px;
    line-height: 1.5;
    color: #F5F5F5;
    background: #242424 url("assets/gruul/backgrounds/bladesedge-background.webp") center center / cover no-repeat fixed;
    margin: 0;
    padding: 20px;
  }
  .roster-top-actions,
  .roster-form {
    max-width: 1280px;
    margin-left: auto;
    margin-right: auto;
  }
  .roster-top-actions {
    margin-bottom: 10px;
    padding: 0 12px;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    column-gap: 6px;
    row-gap: 10px;
    flex-wrap: wrap;
  }
  .roster-form {
    margin-bottom: 16px;
    background: #2F2F2F;
    border: 1px solid #4A4A4A;
    border-radius: 8px;
    overflow: hidden;
  }
  .roster-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 22px;
    border-bottom: 0.5px solid #4A4A4A;
    background: #333333;
  }
  .roster-title h2 { font-size: 14px; font-weight: 500; margin: 0 0 2px; }
  .roster-title p { font-size: 11.5px; color: #C7C7C7; margin: 0; }
  .roster-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; margin-left: auto; }
  .raid-code-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border: 0.5px solid #6FA8DC;
    border-radius: 5px;
    background: rgba(111, 168, 220, 0.14);
    color: #F5F5F5;
    font-size: 11.5px;
    line-height: 1.2;
  }
  .raid-code-badge[hidden] { display: none !important; }
  .raid-code-value {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #FFFFFF;
  }
  .soft-reserve-control { display: inline-flex; align-items: center; gap: 6px; color: #D8D8D8; font-size: 11px; }
  .soft-reserve-control input { width: 220px; min-width: 160px; padding: 6px 9px; border: 0.5px solid #626262; border-radius: 5px; background: #3A3A3A; color: #F5F5F5; font: inherit; font-size: 12px; }
  .soft-reserve-control input::placeholder { color: #C7C7C7; opacity: 1; }
  .soft-reserve-control input:focus { outline: none; border-color: #6FA8DC; box-shadow: 0 0 0 2px rgba(111, 168, 220, 0.25); }
  .btn {
    font-size: 12px;
    padding: 7px 14px;
    border: 0.5px solid #626262;
    background: #4A4A4A;
    border-radius: 5px;
    cursor: pointer;
    font-family: inherit;
    color: #F5F5F5;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    text-decoration: none;
  }
  .btn:hover { background: #555555; border-color: #707070; }
  .btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .btn:disabled:hover { background: #4A4A4A; border-color: #626262; }
  .btn:focus-visible { outline: none; border-color: #6FA8DC; box-shadow: 0 0 0 2px rgba(111, 168, 220, 0.25); }
  .btn-icon { display: inline-flex; align-items: center; gap: 6px; }
  .btn-icon-img { width: 14px; height: 14px; object-fit: contain; pointer-events: none; }
  .btn-primary { background: #4A4A4A; color: #FFFFFF; border-color: #626262; }
  .btn-primary:hover { background: #555555; border-color: #707070; }
  .btn-create { background: #1F8A4C; color: #FFFFFF; border-color: #2EA866; }
  .btn-create:hover { background: #176B3A; border-color: #238A52; }
  .btn-danger { background: #B3261E; color: #FFFFFF; border-color: #C63D35; }
  .btn-danger:hover { background: #8C1D18; border-color: #A8322B; }
  .roster-section { padding: 16px 22px; border-bottom: 0.5px solid #4A4A4A; }
  .roster-section:last-child { border-bottom: none; }
  .roster-section.boss-section { background: #333333; }
  .roster-section-header { font-size: 12px; font-weight: 500; letter-spacing: 0.4px; color: #F5F5F5; margin-bottom: 14px; }
  .roster-section-header small { display: block; margin-top: 2px; font-size: 10.5px; font-weight: 400; letter-spacing: 0.2px; color: #C7C7C7; }
  .roster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 22px; }
  .roster-group-label {
    font-size: 10.5px; font-weight: 500; letter-spacing: 0.7px; text-transform: uppercase;
    color: #D8D8D8; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between;
  }
  .roster-controls-spacer { height: 26px; pointer-events: none; visibility: hidden; }
  .roster-subgroup-label {
    font-size: 11px; font-weight: 500; color: #D8D8D8; margin: 14px 0 6px 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .roster-subgroup-label:first-of-type { margin-top: 4px; }
  .slot-controls { display: flex; align-items: center; gap: 5px; }
  .slot-btn {
    width: 22px; height: 22px; padding: 0; border: 0.5px solid #626262; background: #4A4A4A;
    border-radius: 3px; cursor: pointer; font-family: inherit; font-size: 13px; line-height: 1;
    color: #F5F5F5; display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .slot-btn:hover { background: #555555; border-color: #707070; color: #FFFFFF; }
  .slot-btn:focus-visible { outline: none; border-color: #6FA8DC; box-shadow: 0 0 0 2px rgba(111, 168, 220, 0.25); }
  .slot-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .roster-row {
    display: grid;
    grid-template-columns: 24px minmax(0, 112px) minmax(0, 1fr);
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .roster-row:last-child { margin-bottom: 0; }
  .roster-row .role-icon {
    width: 22px; height: 22px; border-radius: 3px; overflow: hidden;
    border: 0.5px solid rgba(0,0,0,0.15); display: inline-flex; align-items: center; justify-content: center;
  }
  .roster-row .role-icon img { width: 100%; height: 100%; display: block; object-fit: cover; }
  .roster-row .role-icon.raid-position-icon {
    border: none;
    background: transparent;
    overflow: visible;
    gap: 2px;
  }
  .roster-row .role-icon.raid-position-icon img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    border-radius: 0;
    flex: 0 0 18px;
  }
  .roster-row .role-icon.raid-position-icon.marker-pair {
    width: 38px;
    margin-left: -7px;
    overflow: visible;
  }
  .roster-row .role-text { font-size: 11.5px; color: #E8E8E8; }
  .roster-row input {
    padding: 5px 7px; font-size: 12px; border: 0.5px solid #626262; border-radius: 4px;
    font-family: inherit; color: #F5F5F5; background: #4A4A4A; width: 100%; min-width: 0;
  }
  .roster-row input::placeholder { color: #C7C7C7; opacity: 1; }
  .roster-row input:focus { outline: none; border-color: #6FA8DC; box-shadow: 0 0 0 2px rgba(111, 168, 220, 0.25); }
  .raid-marker {
    display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px;
    border-radius: 5px; background: #3A3A3A; border: 0.5px solid #555555;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.55); padding: 2px; overflow: hidden; vertical-align: middle;
  }
  .raid-marker img { width: 18px; height: 18px; object-fit: contain; display: block; }
  .core-roster-section {
    --core-role-icon: 24px;
    --core-role-label: 88px;
    --core-input-width: 152px;
    --core-role-input: var(--core-input-width);
    --core-row-gap: 8px;
    --core-column-gap: 18px;
    --core-block-row-gap: 9px;
    --core-misdirect-target-width: 138px;
  }
  .core-roster-section .roster-grid {
    grid-template-columns: repeat(auto-fit, minmax(252px, max-content));
    column-gap: var(--core-column-gap);
    row-gap: 18px;
    align-items: start;
    justify-content: start;
  }
  .core-roster-section .roster-group { max-width: 100%; }
  .core-roster-section .core-roster-block {
    display: flex;
    flex-direction: column;
  }
  .core-roster-section .core-roster-block > .roster-group,
  .core-roster-section .core-roster-block > .roster-row {
    margin-bottom: var(--core-block-row-gap);
  }
  .core-roster-section .core-roster-block > .roster-group:last-child,
  .core-roster-section .core-roster-block > .roster-row:last-child {
    margin-bottom: 0;
  }
  .core-roster-section .core-roster-block-tanks { --core-role-label: 82px; }
  .core-roster-section .core-roster-block-healers { --core-role-label: 88px; }
  .core-roster-section .core-roster-block-misdirect {
    --core-role-label: 0px;
    --core-misdirect-row-width: calc(
      var(--core-role-icon) + var(--core-input-width) + var(--core-misdirect-target-width) +
      var(--core-row-gap) + var(--core-row-gap)
    );
    --core-block-width: var(--core-misdirect-row-width);
    min-width: var(--core-block-width);
  }
  .core-roster-section .core-roster-block-utility { --core-role-label: 96px; }
  .core-roster-section .roster-row {
    grid-template-columns: var(--core-role-icon) var(--core-role-label) var(--core-role-input);
    width: max-content;
    max-width: 100%;
    gap: var(--core-row-gap);
    margin-bottom: 8px;
  }
  .core-roster-section .roster-row.misdirect-target-row {
    grid-template-columns: var(--core-role-icon) var(--core-input-width) minmax(var(--core-misdirect-target-width), max-content);
  }
  .core-roster-section .md-label,
  .core-roster-section .md-target-label { min-width: max-content; }
  .core-roster-section .md-target-label { gap: 7px; }
  .core-roster-section .md-target-text { overflow: visible; text-overflow: clip; }
  .roster-inline-list [data-slot-list] { width: max-content; max-width: 100%; }
  [data-slot-list] > .slot-controls {
    width: 100%;
    min-height: 22px;
    justify-content: flex-end;
    margin: 0 0 8px;
  }
  [data-slot-list] > .slot-controls-to-input { width: calc(var(--core-role-icon) + var(--core-row-gap) + var(--core-input-width)); }
  .md-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    line-height: 1.25;
    min-width: 0;
    color: #F5F5F5;
    font-size: 11.5px;
    white-space: nowrap;
  }
  .md-label .raid-marker {
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0;
    border-radius: 0;
    overflow: visible;
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
  }
  .md-label .raid-marker img { width: 18px; height: 18px; border-radius: 0; }
  .md-target-text {
    font-size: 11.5px;
    color: #F5F5F5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .roster-utility-group .roster-row .role-text {
    justify-self: end;
    text-align: right;
  }
  .notice { max-width: 1280px; margin: 0 auto 10px; color: #F0C36A; padding: 0 12px; }
  @media (max-width: 700px) { .roster-header { align-items: flex-start; flex-direction: column; } .roster-actions { margin-left: 0; } }
</style>
</head>
<body data-page-role="roster-editor" data-raid-id="gruuls-lair">
<div class="roster-top-actions screen-only">
  <a class="btn" href="index.html">Home</a>
  <label class="soft-reserve-control" for="soft-reserve-url">
    <input id="soft-reserve-url" type="url" placeholder="Soft Reserve URL" autocomplete="off" aria-label="Soft Reserve URL">
  </label>
  <div class="roster-actions">
    <button class="btn btn-create btn-icon" id="export-raid-sheet-link" type="button"><img class="btn-icon-img" src="assets/shared/icons/create-raidsheet.svg" alt="" aria-hidden="true"> <span>Create Raidsheet</span></button>
    <a class="btn btn-primary btn-icon" id="public-guide-link" href="maulgar.html"><img class="btn-icon-img" src="assets/shared/icons/raidsheet.svg" alt="" aria-hidden="true"> <span>Raidsheet</span></a>
    <button class="btn btn-danger btn-icon" id="clear-roster" type="button"><img class="btn-icon-img" src="assets/shared/icons/clear-all.svg" alt="" aria-hidden="true"> <span>Clear all</span></button>
  </div>
</div>
<div id="load-notice" class="notice" role="status" aria-live="polite"></div>
<form class="roster-form">
  <div class="roster-header">
    <div class="roster-title">
      <h2>Gruul's & Magtheridon's Lair Roster</h2>
      <p>Assign Roles then Create Raidsheet to Share</p>
    </div>
  </div>
  <div id="roster-sections"></div>
</form>

<script>
window.RaidConfig = { raidId: 'gruuls-lair' };
</script>
<script src="js/roster-storage.js"></script>
<script src="js/session-client.js"></script>
<script src="js/roster-ui-helpers.js"></script>
<script>
(function() {
  'use strict';

  const RAID_ID = 'gruuls-lair';
  const ROSTER_SCHEMA_PATH = 'raids/gruuls-lair/roster-schema.json';
  const GUIDE_PAGE = 'maulgar.html';
  const storage = window.RaidRosterStorage;
  const sessionClient = window.RaidSessionClient;
  const SOFT_RESERVE_KEY = 'soft-reserve-url';
  let state = { groups: {}, singles: {}, meta: {} };
  let rosterSchema = { fields: {} };

  const iconUrl = window.RosterUiHelpers.iconUrl;
  const raidMarkerSource = window.RosterUiHelpers.raidMarkerSource;
  const copyTextWithButtonFeedback = window.RosterUiHelpers.copyTextWithButtonFeedback;
  const bindSoftReserveInput = window.RosterUiHelpers.bindSoftReserveInput;

  const GRUUL_ROSTER_CONFIG = {
    groupDefs: {
      'off-tanks': { defaultCount: 1, minCount: 0, defaultLabel: 'Off Tank' },
      'kiggler-tanks': { defaultCount: 1, minCount: 0, defaultLabel: 'Kiggler Tank' },
      'main-tank-healers': { defaultCount: 1, minCount: 0, defaultLabel: 'MT Healer' },
      'off-tank-healers': { defaultCount: 1, minCount: 0, defaultLabel: 'OT Healer' },
      'raid-healers': { defaultCount: 1, minCount: 0, defaultLabel: 'Raid Healer' },
      'md-maulgar': { defaultCount: 1, minCount: 0, defaultLabel: 'Hunter' },
      'md-ot': { defaultCount: 1, minCount: 0, defaultLabel: 'Hunter' },
      'md-blindeye': { defaultCount: 1, minCount: 0, defaultLabel: 'Hunter' },
      'md-kiggler': { defaultCount: 1, minCount: 0, defaultLabel: 'Hunter' },
      'blindeye-kicks': { defaultCount: 6, minCount: 0, defaultLabel: 'Kick' }
    },
    offTankLabels: {
      combined: 'Blindeye / Olm',
      blindeye: 'OT/Blindeye Tank',
      olm: 'Olm Tank',
      extraPrefix: 'Extra Off Tank'
    },
    controlTitles: {
      'off-tanks': { addTitle: 'Add off tank', removeTitle: 'Remove off tank' },
      'kiggler-tanks': { addTitle: 'Add Kiggler tank', removeTitle: 'Remove Kiggler tank' },
      'main-tank-healers': { addTitle: 'Add main tank healer', removeTitle: 'Remove main tank healer' },
      'off-tank-healers': { addTitle: 'Add off tank healer', removeTitle: 'Remove off tank healer' },
      'raid-healers': { addTitle: 'Add raid healer', removeTitle: 'Remove raid healer' },
      'md-maulgar': { addTitle: 'Add main tank misdirect', removeTitle: 'Remove main tank misdirect' },
      'md-ot': { addTitle: 'Add Olm misdirect', removeTitle: 'Remove Olm misdirect' },
      'md-blindeye': { addTitle: 'Add Blindeye misdirect', removeTitle: 'Remove Blindeye misdirect' },
      'md-kiggler': { addTitle: 'Add Kiggler misdirect', removeTitle: 'Remove Kiggler misdirect' },
      'blindeye-kicks': { addTitle: 'Add kick', removeTitle: 'Remove kick' }
    },
    fieldMeta: {
      'main-tank': { label: 'Main Tank', placeholder: 'Main Tank', marker: 'skull', markerTitle: 'Skull' },
      'off-tanks': { label: 'Off Tanks', placeholder: 'Tank', defaultLabel: 'Off Tank', icon: 'ability_warrior_defensivestance' },
      'kiggler-tanks': { label: 'Kiggler Tanks', placeholder: 'Moonkin / hunter', defaultLabel: 'Kiggler Tank', marker: 'diamond', markerTitle: 'Diamond' },
      'mage-tank': { label: 'Mage Tank', placeholder: 'Mage Tank', marker: 'square', markerTitle: 'Square' },
      'main-tank-healers': { label: 'MT Healers', placeholder: 'Healer', defaultLabel: 'MT Healer', icon: 'spell_holy_greaterheal' },
      'off-tank-healers': { label: 'OT Healers', placeholder: 'Healer', defaultLabel: 'OT Healer', icon: 'spell_holy_greaterheal' },
      'kiggler-healer': { label: 'Kiggler Tank Healer', placeholder: 'Healer', icon: 'spell_holy_greaterheal' },
      'mage-tank-healer': { label: 'Mage Tank Healer', placeholder: 'Healer', icon: 'spell_holy_greaterheal' },
      'raid-healers': { label: 'Raid Healers', placeholder: 'Healer', defaultLabel: 'Raid Healer', icon: 'spell_holy_prayerofhealing' },
      'md-maulgar': { label: 'Maulgar Misdirect', placeholder: 'Hunter', defaultLabel: 'Hunter', icon: 'ability_hunter_misdirection', suppressRowLabel: true, targetMarker: 'skull', targetMarkerTitle: 'Skull', targetKey: 'main-tank' },
      'md-ot': { label: 'Olm Misdirect', placeholder: 'Hunter', defaultLabel: 'Hunter', icon: 'ability_hunter_misdirection', suppressRowLabel: true, targetMarker: 'cross', targetMarkerTitle: 'Cross', targetKey: 'olm-tank' },
      'md-blindeye': { label: 'Blindeye Misdirect', placeholder: 'Hunter', defaultLabel: 'Hunter', icon: 'ability_hunter_misdirection', suppressRowLabel: true, targetMarker: 'moon', targetMarkerTitle: 'Moon', targetKey: 'blindeye-tank' },
      'md-kiggler': { label: 'Kiggler Misdirect', placeholder: 'Hunter', defaultLabel: 'Hunter', icon: 'ability_hunter_misdirection', suppressRowLabel: true, targetMarker: 'diamond', targetMarkerTitle: 'Diamond', targetKey: 'kiggler-tanks' },
      'blindeye-kicks': { label: 'Kicks', placeholder: 'Kicker', defaultLabel: 'Kick', icon: 'ability_kick', forceNumbering: true },
      'curse-elements': { label: 'Elements', placeholder: 'Warlock', icon: 'spell_shadow_chilltouch' },
      'curse-reck': { label: 'Recklessness', placeholder: 'Warlock', icon: 'spell_shadow_unholystrength' },
      'curse-tongues': { label: 'Tongues', placeholder: 'Warlock', icon: 'spell_shadow_curseoftounges' },
      'magtheridon-clicker-1': { label: 'Skull', placeholder: 'Clicker', marker: 'skull', markerTitle: 'Skull' },
      'magtheridon-clicker-2': { label: 'X', placeholder: 'Clicker', marker: 'cross', markerTitle: 'X' },
      'magtheridon-clicker-3': { label: 'Square', placeholder: 'Clicker', marker: 'square', markerTitle: 'Square' },
      'magtheridon-clicker-4': { label: 'Diamond', placeholder: 'Clicker', marker: 'diamond', markerTitle: 'Diamond' },
      'magtheridon-clicker-5': { label: 'Moon', placeholder: 'Clicker', marker: 'moon', markerTitle: 'Moon' },
      'magtheridon-backup-skull': { label: 'Skull', placeholder: 'Backup', marker: 'skull', markerTitle: 'Skull' },
      'magtheridon-backup-cross': { label: 'X', placeholder: 'Backup', marker: 'cross', markerTitle: 'X' },
      'magtheridon-backup-square': { label: 'Square', placeholder: 'Backup', marker: 'square', markerTitle: 'Square' },
      'magtheridon-backup-diamond': { label: 'Diamond', placeholder: 'Backup', marker: 'diamond', markerTitle: 'Diamond' },
      'magtheridon-backup-moon': { label: 'Moon', placeholder: 'Backup', marker: 'moon', markerTitle: 'Moon' }
    },
    layout: [
      {
        title: 'Core roster',
        blocks: [
          { title: 'Tanks', fields: ['main-tank', 'off-tanks', 'kiggler-tanks', 'mage-tank'] },
          { title: 'Healers', fields: ['main-tank-healers', 'off-tank-healers', 'kiggler-healer', 'mage-tank-healer', 'raid-healers'] },
          { title: 'Misdirect', fields: ['md-maulgar', 'md-ot', 'md-blindeye', 'md-kiggler'] },
          { title: 'Utility', fields: ['curse-elements', 'curse-reck', 'curse-tongues', 'blindeye-kicks'] }
        ]
      },
      {
        title: 'Magtheridon',
        blocks: [
          { title: 'Cube Clickers', fields: ['magtheridon-clicker-1', 'magtheridon-clicker-2', 'magtheridon-clicker-3', 'magtheridon-clicker-4', 'magtheridon-clicker-5'] },
          { title: 'CUBE BACKUPS', fields: ['magtheridon-backup-skull', 'magtheridon-backup-cross', 'magtheridon-backup-square', 'magtheridon-backup-diamond', 'magtheridon-backup-moon'] }
        ]
      }
    ]
  };

  const GROUP_DEFS = GRUUL_ROSTER_CONFIG.groupDefs;
  const FIELD_META = GRUUL_ROSTER_CONFIG.fieldMeta;
  const ROSTER_LAYOUT = GRUUL_ROSTER_CONFIG.layout;

  function titleFromKey(key) {
    return key.replace(/-/g, ' ').replace(/\b\w/g, function(char) { return char.toUpperCase(); });
  }

  function getFieldMeta(key) {
    return FIELD_META[key] || { label: titleFromKey(key), placeholder: 'Player', defaultLabel: 'Player' };
  }

  function fallbackSchemaFields() {
    const fields = {};
    Object.keys(FIELD_META).forEach(function(key) {
      fields[key] = GROUP_DEFS[key] ? { type: 'list' } : { type: 'single' };
    });
    return fields;
  }

  async function loadRosterSchema() {
    try {
      const response = await fetch(ROSTER_SCHEMA_PATH, { cache: 'no-cache' });
      if (!response.ok) throw new Error('Failed to load Gruul roster schema');
      const schema = await response.json();
      return schema && schema.fields ? schema.fields : fallbackSchemaFields();
    } catch (error) {
      document.getElementById('load-notice').textContent = 'Using embedded Gruul roster schema because the raid schema could not be loaded.';
      return fallbackSchemaFields();
    }
  }

  function ensureRosterStateShape(nextState) {
    const safeState = nextState && typeof nextState === 'object' ? nextState : {};
    const rosterState = {
      groups: safeState.groups && typeof safeState.groups === 'object' && !Array.isArray(safeState.groups) ? safeState.groups : {},
      singles: safeState.singles && typeof safeState.singles === 'object' && !Array.isArray(safeState.singles) ? safeState.singles : {},
      meta: safeState.meta && typeof safeState.meta === 'object' && !Array.isArray(safeState.meta) ? safeState.meta : {}
    };
    if (Object.prototype.hasOwnProperty.call(rosterState.singles, SOFT_RESERVE_KEY)) {
      if (!Object.prototype.hasOwnProperty.call(rosterState.meta, SOFT_RESERVE_KEY)) rosterState.meta[SOFT_RESERVE_KEY] = rosterState.singles[SOFT_RESERVE_KEY];
      delete rosterState.singles[SOFT_RESERVE_KEY];
    }
    return rosterState;
  }

  function currentSession() {
    return sessionClient && sessionClient.getCurrentSession ? sessionClient.getCurrentSession() : { mode: 'local', isSessionBacked: false };
  }

  function loadState() {
    if (sessionClient && sessionClient.loadSessionRoster) return Promise.resolve(sessionClient.loadSessionRoster());
    return Promise.resolve(storage.loadRoster(RAID_ID));
  }

  function saveState() {
    const rosterState = ensureRosterStateShape(state);
    if (sessionClient && sessionClient.saveSessionRoster) return sessionClient.saveSessionRoster(rosterState);
    storage.saveRoster(rosterState, RAID_ID);
    return Promise.resolve(true);
  }

  function clearSavedState() {
    if (sessionClient && sessionClient.clearSessionRoster) return Promise.resolve(sessionClient.clearSessionRoster());
    storage.clearRoster(RAID_ID);
    return Promise.resolve(true);
  }

  function normalizeState() {
    state = ensureRosterStateShape(state);

    Object.keys(rosterSchema.fields).forEach(function(key) {
      const field = rosterSchema.fields[key] || {};
      if (field.type === 'list') {
        if (!Array.isArray(state.groups[key])) {
          state.groups[key] = typeof state.singles[key] === 'string' && state.singles[key] ? [state.singles[key]] : [];
          delete state.singles[key];
        }
        const def = GROUP_DEFS[key] || { defaultCount: 1, minCount: 1 };
        const slotCount = Math.max(state.groups[key].length, def.defaultCount || 0, def.minCount || 0);
        while (state.groups[key].length < slotCount) state.groups[key].push('');
      } else if (field.type === 'single' && typeof state.groups[key] !== 'undefined') {
        if (Array.isArray(state.groups[key]) && state.groups[key].length && !state.singles[key]) state.singles[key] = state.groups[key][0] || '';
        delete state.groups[key];
      }
    });
  }

  function cleanValue(value) { return value ? String(value).trim() : ''; }
  function cleanList(values) { return (values || []).map(cleanValue).filter(Boolean); }
  function getOffTankSlots() { return state.groups['off-tanks'] || []; }
  function getBlindeyeTank() { return cleanValue(getOffTankSlots()[0]); }
  function getOlmTank() {
    const slots = getOffTankSlots();
    if (slots.length < 2) return cleanValue(slots[0]);
    return cleanValue(slots[1]) || cleanValue(slots[0]);
  }
  function getTargetValue(targetKey) {
    if (targetKey === 'blindeye-tank') return getBlindeyeTank();
    if (targetKey === 'olm-tank') return getOlmTank();
    if (rosterSchema.fields[targetKey] && rosterSchema.fields[targetKey].type === 'list') return cleanList(state.groups[targetKey]).join(', ');
    return cleanValue(state.singles[targetKey]);
  }
  function getTargetFallbackLabel(targetKey) {
    const labels = {
      'main-tank': 'Main Tank',
      'blindeye-tank': 'Blindeye tank',
      'olm-tank': 'Olm tank',
      'kiggler-tanks': 'Kiggler tanks',
      'mage-tank': 'Mage Tank'
    };
    return labels[targetKey] || targetKey || '';
  }
  function getTargetDisplay(targetKey) { return getTargetValue(targetKey) || getTargetFallbackLabel(targetKey); }

  function makeRoleIcon(meta) {
    const iconCell = document.createElement('span');
    iconCell.className = 'role-icon';
    const markerSrc = meta.marker ? raidMarkerSource(meta.marker) : '';
    if (markerSrc) {
      iconCell.className += ' raid-position-icon';
      iconCell.innerHTML = '<img src="' + markerSrc + '" alt="' + (meta.markerTitle || meta.label || 'Raid marker') + '" title="' + (meta.markerTitle || meta.label || 'Raid marker') + '">';
    } else if (meta.icon) {
      iconCell.innerHTML = '<img src="' + iconUrl(meta.icon) + '" alt="">';
    }
    return iconCell;
  }

  function markerIconCell(markers) {
    const list = Array.isArray(markers) ? markers : [markers];
    const iconCell = document.createElement('span');
    iconCell.className = 'role-icon raid-position-icon' + (list.length > 1 ? ' marker-pair' : '');
    list.forEach(function(marker) {
      const img = document.createElement('img');
      img.src = raidMarkerSource(marker.marker);
      img.alt = marker.title || '';
      img.title = marker.title || '';
      iconCell.appendChild(img);
    });
    return iconCell;
  }

  // Gruul-specific hook: one off-tank combines Blindeye/Olm, two split them, extras remain explicit backup slots.
  function offTankRowConfig(index) {
    const labels = GRUUL_ROSTER_CONFIG.offTankLabels;
    if (getOffTankSlots().length < 2) return { label: labels.combined, markers: [{ marker: 'moon', title: 'Moon' }, { marker: 'cross', title: 'X' }] };
    if (index === 0) return { label: labels.blindeye, markers: { marker: 'moon', title: 'Moon' } };
    if (index === 1) return { label: labels.olm, markers: { marker: 'cross', title: 'X' } };
    return { label: labels.extraPrefix + ' ' + (index + 1), meta: { icon: 'ability_warrior_defensivestance' } };
  }

  function singleRow(key) {
    const meta = getFieldMeta(key);
    const row = document.createElement('div');
    row.className = 'roster-row';

    const label = document.createElement('span');
    label.className = 'role-text';
    label.textContent = meta.label;

    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = meta.placeholder || 'Player';
    input.dataset.roster = key;
    input.value = state.singles[key] || '';
    input.addEventListener('input', function() {
      const trimmed = input.value.trim();
      if (trimmed) state.singles[key] = trimmed;
      else delete state.singles[key];
      saveState();
      updateMisdirectTargets();
    });

    row.appendChild(makeRoleIcon(meta));
    row.appendChild(label);
    row.appendChild(input);
    return row;
  }

  function slotControls(key) {
    const titles = GRUUL_ROSTER_CONFIG.controlTitles[key] || { addTitle: 'Add', removeTitle: 'Remove' };
    const controls = document.createElement('span');
    controls.className = 'slot-controls';
    controls.innerHTML = '<button class="slot-btn" type="button" data-action="add" data-target="' + key + '" title="' + titles.addTitle + '">+</button><button class="slot-btn" type="button" data-action="remove" data-target="' + key + '" title="' + titles.removeTitle + '">−</button>';
    return controls;
  }

  function listRowLabel(meta, key, idx, inlineControls) {
    if (key === 'off-tanks') return offTankRowConfig(idx).label;
    const baseLabel = meta.defaultLabel || meta.label || 'Player';
    if (meta.suppressNumbering) return baseLabel;
    if (meta.forceNumbering) return baseLabel + ' ' + (idx + 1);
    if (inlineControls && idx === 0) return meta.label;
    return baseLabel + (state.groups[key].length > 1 ? ' ' + (idx + 1) : '');
  }

  function misdirectTargetLabel(meta) {
    const label = document.createElement('span');
    label.className = 'md-label md-target-label';
    label.appendChild(document.createTextNode('→'));

    const marker = document.createElement('span');
    marker.className = 'raid-marker';
    marker.innerHTML = '<img src="' + raidMarkerSource(meta.targetMarker) + '" alt="' + (meta.targetMarkerTitle || '') + '" title="' + (meta.targetMarkerTitle || '') + '">';
    label.appendChild(marker);

    const target = document.createElement('span');
    target.className = 'md-target-text';
    target.dataset.mdTarget = meta.targetKey || '';
    target.textContent = '→ ' + getTargetDisplay(meta.targetKey);
    label.appendChild(target);
    return label;
  }

  function renderList(list, key) {
    const meta = getFieldMeta(key);
    const inlineControls = list.dataset.inlineControls === 'true';
    const isMisdirect = !!meta.targetKey;
    list.innerHTML = '';
    if (inlineControls) {
      const controls = slotControls(key);
      if (isMisdirect) controls.classList.add('slot-controls-to-input');
      list.appendChild(controls);
    }

    state.groups[key].forEach(function(value, idx) {
      const row = document.createElement('div');
      row.className = 'roster-row' + (isMisdirect ? ' misdirect-target-row' : '');

      const label = document.createElement('span');
      label.className = 'role-text';
      label.textContent = listRowLabel(meta, key, idx, inlineControls);

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = meta.placeholder || 'Player';
      input.value = value || '';
      input.addEventListener('input', function() {
        state.groups[key][idx] = input.value.trim();
        saveState();
        updateMisdirectTargets();
      });

      if (key === 'off-tanks') {
        const config = offTankRowConfig(idx);
        row.appendChild(config.markers ? markerIconCell(config.markers) : makeRoleIcon(config.meta || meta));
      } else {
        row.appendChild(makeRoleIcon(meta));
      }
      if (!meta.suppressRowLabel) row.appendChild(label);
      row.appendChild(input);
      list.appendChild(row);
    });

    const removeBtn = document.querySelector('.slot-btn[data-action="remove"][data-target="' + key + '"]');
    if (removeBtn) removeBtn.disabled = state.groups[key].length <= (GROUP_DEFS[key].minCount || 0);
  }

  function updateMisdirectTargets() {
    document.querySelectorAll('.md-target-text[data-md-target]').forEach(function(target) {
      target.textContent = '→ ' + getTargetDisplay(target.dataset.mdTarget);
    });
  }

  function controlsSpacer() {
    const spacer = document.createElement('div');
    spacer.className = 'roster-controls-spacer';
    spacer.setAttribute('aria-hidden', 'true');
    return spacer;
  }

  function singleFieldBlock(key) {
    const wrapper = document.createElement('div');
    wrapper.className = 'roster-group roster-inline-field roster-group-has-spacer';
    wrapper.appendChild(controlsSpacer());
    wrapper.appendChild(singleRow(key));
    return wrapper;
  }

  function listBlock(key, inlineControls) {
    const meta = getFieldMeta(key);
    const wrapper = document.createElement('div');
    wrapper.className = 'roster-group';

    const list = document.createElement('div');
    list.className = 'slot-list';
    list.dataset.slotList = key;

    if (inlineControls) {
      wrapper.className += ' roster-inline-list';
      list.dataset.inlineControls = 'true';
    } else {
      const header = document.createElement('div');
      header.className = 'roster-group-label';
      const title = document.createElement('span');
      title.textContent = meta.label;
      header.appendChild(title);
      header.appendChild(slotControls(key));
      wrapper.appendChild(header);
    }

    wrapper.appendChild(list);
    renderList(list, key);
    return wrapper;
  }

  function appendField(container, key, inlineListControls, alignSingleWithLists) {
    const field = rosterSchema.fields[key];
    if (!field) return;
    if (field.type === 'list') {
      container.appendChild(listBlock(key, inlineListControls));
      return;
    }
    container.appendChild(alignSingleWithLists ? singleFieldBlock(key) : singleRow(key));
  }

  function fieldIsList(key) {
    const field = rosterSchema.fields[key];
    return !!field && field.type === 'list';
  }

  function sectionHeader(config) {
    if (!config.title && !config.subtitle) return null;
    const header = document.createElement('div');
    header.className = 'roster-section-header';
    if (config.title) header.appendChild(document.createTextNode(config.title));
    if (config.subtitle) {
      const subtitle = document.createElement('small');
      subtitle.textContent = config.subtitle;
      header.appendChild(subtitle);
    }
    return header;
  }

  function blockColumn(block, alignWithListBlocks) {
    const wrapper = document.createElement('div');
    const blockClass = 'core-roster-block-' + block.title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    const needsSpacer = alignWithListBlocks && !fieldIsList(block.fields[0]);
    wrapper.className = 'roster-group core-roster-block ' + blockClass + (needsSpacer ? ' roster-group-has-spacer' : '');

    const label = document.createElement('div');
    label.className = 'roster-group-label';
    label.textContent = block.title;
    wrapper.appendChild(label);
    if (needsSpacer) wrapper.appendChild(controlsSpacer());

    block.fields.forEach(function(key) { appendField(wrapper, key, true, false); });
    return wrapper;
  }

  function renderRoster() {
    const sections = document.getElementById('roster-sections');
    sections.innerHTML = '';

    ROSTER_LAYOUT.forEach(function(config) {
      const section = document.createElement('section');
      section.className = 'roster-section';
      if (config.blocks) section.className += ' core-roster-section';
      else section.className += ' boss-roster-section';
      const grid = document.createElement('div');
      grid.className = 'roster-grid';

      if (config.blocks) {
        const alignWithListBlocks = config.blocks.some(function(block) { return fieldIsList(block.fields[0]); });
        config.blocks.forEach(function(block) { grid.appendChild(blockColumn(block, alignWithListBlocks)); });
      } else {
        const sectionHasInlineLists = config.fields.some(fieldIsList);
        config.fields.forEach(function(key) { appendField(grid, key, true, sectionHasInlineLists); });
      }

      const header = sectionHeader(config);
      if (header) section.appendChild(header);
      section.appendChild(grid);
      sections.appendChild(section);
    });
    updatePublicGuideControls();
  }

  function buildExportEnvelope() {
    return JSON.stringify({
      version: storage.DATA_VERSION,
      updatedAt: new Date().toISOString(),
      payload: ensureRosterStateShape(state)
    });
  }

  function encodeRoster(raw) {
    const json = raw || buildExportEnvelope();
    const bin = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, function(_, hex) { return String.fromCharCode(parseInt(hex, 16)); });
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  }

  function rosterUrl(fileName) {
    const session = currentSession();
    const url = new URL(fileName, location.href);
    url.search = '';
    url.hash = '';

    if (session && session.isSessionBacked && session.sessionId) {
      url.search = '?session=' + encodeURIComponent(session.sessionId);
      return url.href;
    }

    const storageKey = storage.getStorageKey ? storage.getStorageKey(RAID_ID) : storage.STORAGE_KEY;
    url.hash = 'roster=' + encodeRoster(localStorage.getItem(storageKey));
    return url.href;
  }

  function setButtonContent(button, iconSrc, label) {
    if (!button) return;
    button.textContent = '';

    const icon = document.createElement('img');
    icon.className = 'btn-icon-img';
    icon.src = iconSrc;
    icon.alt = '';
    icon.setAttribute('aria-hidden', 'true');
    button.appendChild(icon);

    const text = document.createElement('span');
    text.textContent = label;
    button.appendChild(text);
  }

  function raidsheetUrl() {
    const session = currentSession();
    const url = new URL(GUIDE_PAGE, location.href);
    url.search = '';
    url.hash = '';

    if (session && session.isSessionBacked && session.publicCode) {
      url.search = '?code=' + encodeURIComponent(session.publicCode);
    } else if (session && session.isSessionBacked && session.sessionId) {
      url.search = '?session=' + encodeURIComponent(session.sessionId);
    }

    return url.href;
  }

  function publicGuideUrl() {
    const session = currentSession();

    if (session && session.isSessionBacked && session.publicCode) {
      return new URL('/raid/' + encodeURIComponent(session.publicCode), location.origin).href;
    }

    return raidsheetUrl();
  }

  function copyPublicGuideLink(button) {
    const session = currentSession();
    if (!session || !session.isSessionBacked) return Promise.resolve(false);
    const copied = copyTextWithButtonFeedback(publicGuideUrl(), button, 'Copy this raider view link:');
    return copied;
  }

  function exportRaidSheetLink(button) {
    const session = currentSession();
    if (session && session.isSessionBacked) {
      return copyPublicGuideLink(button);
    }

    if (!sessionClient || !sessionClient.createSessionFromRoster) {
      const copied = copyTextWithButtonFeedback(publicGuideUrl(), button, 'Online export is unavailable. Copy this local guide link:');
      return copied;
    }

    if (button) {
      button.disabled = true;
      button.textContent = 'Creating…';
    }

    return sessionClient.createSessionFromRoster(RAID_ID, ensureRosterStateShape(state))
      .then(function(data) {
        if (!data || !data.editUrl) throw new Error('Missing session edit URL');
        window.location.assign(new URL(data.editUrl, window.location.href).toString());
      })
      .catch(function(error) {
        console.error('[Roster] Unable to export current roster.', error && error.message ? error.message : error);
        alert('Could not export the current roster. Please try again.');
      })
      .finally(function() {
        if (button) {
          button.disabled = false;
          setButtonContent(button, 'assets/shared/icons/create-raidsheet.svg', 'Create Raidsheet');
        }
      });
  }

  function updatePublicGuideControls() {
    const session = currentSession();
    const isSessionBacked = !!(session && session.isSessionBacked);
    const publicCode = session && session.publicCode ? String(session.publicCode).toUpperCase() : '';
    const guideLink = document.getElementById('public-guide-link');
    const exportButton = document.getElementById('export-raid-sheet-link');
    if (guideLink) {
      guideLink.href = raidsheetUrl();
      setButtonContent(guideLink, 'assets/shared/icons/raidsheet.svg', 'Raidsheet');
    }
    if (exportButton) {
      exportButton.disabled = false;
      setButtonContent(
        exportButton,
        isSessionBacked ? 'assets/shared/icons/share-link.svg' : 'assets/shared/icons/create-raidsheet.svg',
        isSessionBacked ? (publicCode ? 'raid/' + publicCode : 'Copy Raider View Link') : 'Create Raidsheet'
      );
      exportButton.title = isSessionBacked ? 'Copy the raider view link.' : '';
    }
  }

  function initSoftReserveInput() {
    bindSoftReserveInput({ getState: function() { return state; }, key: SOFT_RESERVE_KEY, saveState: saveState });
  }

  function initButtons() {
    document.addEventListener('click', function(event) {
      const btn = event.target && event.target.closest ? event.target.closest('.slot-btn[data-action]') : null;
      if (!btn) return;
      const key = btn.dataset.target;
      if (!rosterSchema.fields[key] || rosterSchema.fields[key].type !== 'list') return;
      if (btn.dataset.action === 'add') state.groups[key].push('');
      if (btn.dataset.action === 'remove' && state.groups[key].length > (GROUP_DEFS[key].minCount || 0)) state.groups[key].pop();
      saveState();
      renderRoster();
    });

    const exportBtn = document.getElementById('export-raid-sheet-link');
    if (exportBtn) exportBtn.addEventListener('click', function() {
      exportRaidSheetLink(exportBtn);
    });

    const clearBtn = document.getElementById('clear-roster');
    if (clearBtn) clearBtn.addEventListener('click', function() {
      if (!confirm("Clear all Gruul's Lair assignments?")) return;
      state = { groups: {}, singles: {}, meta: {} };
      normalizeState();
      clearSavedState().then(function() { return saveState(); }).finally(function() {
        renderRoster();
        const softReserveInput = document.getElementById('soft-reserve-url');
        if (softReserveInput) softReserveInput.value = '';
      });
    });
  }

  async function init() {
    rosterSchema.fields = await loadRosterSchema();
    try {
      state = await loadState();
    } catch (error) {
      document.getElementById('load-notice').textContent = 'Unable to load the saved Gruul roster. Starting from an empty roster.';
      state = { groups: {}, singles: {}, meta: {} };
    }
    normalizeState();
    saveState();
    renderRoster();
    initSoftReserveInput();
    initButtons();
  }

  init();
})();
</script>
</body>
</html>
