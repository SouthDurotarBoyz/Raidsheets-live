<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raid Selector</title>
<style>
  * { box-sizing: border-box; }
  html { min-height: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background-color: #111827;
    background-image:
      linear-gradient(rgba(15, 23, 42, 0.28), rgba(15, 23, 42, 0.58)),
      url("assets/landing/backgrounds/landing-background.webp");
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: #f9fafb;
    position: relative;
    padding: 24px;
  }
  .landing {
    position: absolute;
    top: 75vh;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(320px, calc(100vw - 48px));
    padding: 16px;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 18px;
    background: rgba(15, 23, 42, 0.58);
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
    backdrop-filter: blur(3px);
  }
  h1 {
    margin: 0 0 12px;
    font-size: clamp(20px, 3vw, 26px);
    font-weight: 700;
    color: #f9fafb;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
  }
  .raid-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .raid-card {
    display: block;
    text-decoration: none;
    color: #f9fafb;
    border: 1px solid rgba(209, 213, 219, 0.34);
    border-radius: 10px;
    background: rgba(17, 24, 39, 0.72);
    overflow: hidden;
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease, background-color 0.12s ease;
  }
  .raid-card:hover {
    transform: translateY(-1px);
    border-color: rgba(229, 231, 235, 0.7);
    background: rgba(31, 41, 55, 0.86);
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.2);
  }
  .raid-card.is-loading,
  .raid-card[aria-disabled="true"] {
    opacity: 0.75;
    pointer-events: none;
  }
  .raid-card-media {
    height: 6px;
    background: linear-gradient(90deg, #60a5fa, #22d3ee 52%, #a78bfa);
  }
  .raid-card-body {
    padding: 10px 12px;
  }
  .raid-card-name {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.25;
  }
  .status {
    margin: 10px 0 0;
    font-size: 13px;
    line-height: 1.35;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.55);
  }
  .status.error {
    color: #fecaca;
  }
  @media (max-width: 640px) {
    body {
      background-attachment: scroll;
      background-position: center top;
      padding: 56px 16px 20px;
    }
    .landing {
      top: min(75vh, 70%);
      width: min(360px, calc(100vw - 32px));
    }
  }
</style>
</head>
<body>
  <main class="landing">
    <h1>Create a Raidsheet</h1>
    <section class="raid-grid" id="raid-grid">
      <a class="raid-card" href="roster.html" data-raid-id="gruuls-lair">
        <div class="raid-card-media" aria-hidden="true"></div>
        <div class="raid-card-body">
          <p class="raid-card-name">Gruul and Magtheridon</p>
        </div>
      </a>
      <a class="raid-card" href="ssc-roster.html" data-raid-id="serpentshrine-cavern">
        <div class="raid-card-media" aria-hidden="true"></div>
        <div class="raid-card-body">
          <p class="raid-card-name">Serpentshrine Cavern</p>
        </div>
      </a>
      <a class="raid-card" href="hyjal-roster.html" data-raid-id="mount-hyjal">
        <div class="raid-card-media" aria-hidden="true"></div>
        <div class="raid-card-body">
          <p class="raid-card-name">Mount Hyjal</p>
        </div>
      </a>
      <a class="raid-card" href="tk-roster.html" data-raid-id="tempest-keep">
        <div class="raid-card-media" aria-hidden="true"></div>
        <div class="raid-card-body">
          <p class="raid-card-name">Tempest Keep</p>
        </div>
      </a>
    </section>
    <p id="status-message" class="status" role="alert" aria-live="polite"></p>
  </main>
<script>
(function() {
  'use strict';

  function loadRaidName(raidId, configPath, fallbackName) {
    fetch(configPath)
      .then(function(response) {
        if (!response.ok) throw new Error('Failed to load raid config');
        return response.json();
      })
      .then(function(config) {
        var nameEl = document.querySelector('[data-raid-id="' + raidId + '"] .raid-card-name');
        if (!nameEl) return;
        nameEl.textContent = (config && (config.displayName || config.name)) || fallbackName;
      })
      .catch(function() {
        // Keep static fallback card names.
      });
  }

  loadRaidName('gruuls-lair', 'raids/gruuls-lair/raid.json', 'Gruul and Magtheridon');
  loadRaidName('serpentshrine-cavern', 'raids/serpentshrine-cavern/raid.json', 'Serpentshrine Cavern');
  loadRaidName('tempest-keep', 'raids/tempest-keep/raid.json', 'Tempest Keep');
  loadRaidName('mount-hyjal', 'raids/mount-hyjal/raid.json', 'Mount Hyjal');
})();
</script>
</body>
</html>
