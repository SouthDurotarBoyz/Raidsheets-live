<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raid Link Resolver</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #f4efe6;
      background: radial-gradient(circle at top, #30251d 0, #16110e 42%, #090706 100%);
    }
    main {
      width: min(92vw, 34rem);
      padding: 2rem;
      border: 1px solid rgba(210, 166, 96, 0.35);
      border-radius: 0.9rem;
      background: rgba(20, 15, 12, 0.86);
      box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 { margin: 0 0 0.75rem; color: #f6c66f; }
    p { margin: 0.65rem 0; line-height: 1.5; color: #d8c8ad; }
    a { color: #ffd27d; font-weight: 700; }
    .code { color: #fff2c7; font-family: monospace; letter-spacing: 0.08em; }
  </style>
</head>
<body data-page-role="raid-resolver">
  <main>
    <h1 id="status-title">Opening raid…</h1>
    <p id="status-message">Resolving your public raid code.</p>
  </main>

  <script>
    (function() {
      'use strict';

      const API_BASE = 'https://api.raidsheets.com';
      const PUBLIC_CODE_PATTERN = /^[ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{5}$/;
      const DEFAULT_BOSS_PAGES = {
        'gruuls-lair': 'maulgar.html',
        'serpentshrine-cavern': 'hydross.html',
        'tempest-keep': 'alar.html'
      };

      const title = document.getElementById('status-title');
      const message = document.getElementById('status-message');

      function homeLink() {
        return '<p><a href="/">Home</a></p>';
      }

      function showError(text) {
        title.textContent = 'Raid link unavailable';
        message.innerHTML = text + homeLink();
      }

      function codeFromPath() {
        const parts = window.location.pathname.split('/').filter(Boolean);
        if (parts.length >= 2 && parts[0].toLowerCase() === 'raid') return parts[1];
        return '';
      }

      function getPublicCode() {
        const params = new URLSearchParams(window.location.search || '');
        const rawCode = codeFromPath() || params.get('code') || '';
        return String(rawCode).toUpperCase();
      }

      const publicCode = getPublicCode();
      if (!PUBLIC_CODE_PATTERN.test(publicCode)) {
        showError('That raid code is invalid. Public raid codes are five characters, for example <span class="code">FDXBV</span>.');
        return;
      }

      fetch(API_BASE + '/api/codes/' + encodeURIComponent(publicCode), {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      }).then(function(response) {
        if (!response.ok) throw new Error('Raid code not found');
        return response.json();
      }).then(function(payload) {
        const raidId = payload && payload.raidId;
        const bossPage = DEFAULT_BOSS_PAGES[raidId];
        if (!bossPage) throw new Error('Unsupported raid');

        const destination = new URL(bossPage, window.location.href);
        destination.searchParams.set('code', publicCode);
        window.location.replace(destination.toString());
      }).catch(function(error) {
        console.error('[RaidResolver] Unable to resolve public raid code.', error && error.message ? error.message : error);
        showError('We could not find a raid for code <span class="code">' + publicCode + '</span>. Please check the link and try again.');
      });
    })();
  </script>
</body>
</html>
