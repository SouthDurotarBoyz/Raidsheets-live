<script>
(function() {
  'use strict';
  window.RaidRosterStorage.importRosterFromHash();
  (window.BossSheetLoader ? window.BossSheetLoader.loadAll() : Promise.resolve()).then(function() {
    window.RaidRosterBindings.init();
  });
  window.addEventListener('storage', function(event) {
    if (event.key === window.RaidRosterStorage.STORAGE_KEY) location.reload();
  });
})();
</script>
