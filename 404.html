<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Raidsheets</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      color: #f4efe6;
      background: radial-gradient(circle at top, #30251d 0, #16110e 42%, #090706 100%);
    }
    main {
      width: min(92vw, 34rem);
      padding: 2rem;
      border: 1px solid rgba(210, 166, 96, 0.35);
      border-radius: 0.9rem;
      background: rgba(20, 15, 12, 0.86);
      box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 { margin: 0 0 0.75rem; color: #f6c66f; }
    p { margin: 0.65rem 0; line-height: 1.5; color: #d8c8ad; }
    a { color: #ffd27d; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <h1>Page not found</h1>
    <p>This Raidsheets page does not exist or may have moved.</p>
    <p><a href="/">Home</a></p>
  </main>

  <script>
    (function() {
      'use strict';

      const match = window.location.pathname.match(/^\/raid\/([ABCDEFGHJKLMNPQRSTUVWXYZ23456789]{5})\/?$/i);
      if (!match) return;

      const code = match[1].toUpperCase();
      const params = new URLSearchParams(window.location.search || '');
      params.delete('code');

      const extraQuery = params.toString();
      const destination = '/raid.html?code=' + encodeURIComponent(code) + (extraQuery ? '&' + extraQuery : '') + window.location.hash;
      window.location.replace(destination);
    })();
  </script>
</body>
</html>
